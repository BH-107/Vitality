<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset Password</title>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --muted: #6b7280;
      --accent: #0ea5a4;
      --border: #d1d5db;
      --success-bg: #d1fae5;
      --success-text: #065f46;
      --error-bg: #fee2e2;
      --error-text: #991b1b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      width: min(520px, 100%);
      background: var(--card);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(2, 6, 23, 0.08);
    }
    h1 { margin: 0 0 8px 0; font-size: 24px; }
    p { margin: 0 0 18px 0; color: var(--muted); line-height: 1.6; }
    .box { border-radius: 14px; padding: 14px; margin-bottom: 16px; border: 1px solid var(--border); background: #fff; }
    .error { background: var(--error-bg); color: var(--error-text); border-color: #fecaca; font-weight: 600; }
    .success { background: var(--success-bg); color: var(--success-text); border-color: #bbf7d0; font-weight: 600; }
    .input-group { position: relative; margin-bottom: 14px; }
    .input { width: 100%; height: 56px; border: 1px solid var(--border); border-radius: 14px; padding: 0 46px 0 16px; font-size: 16px; color: #111827; outline: none; background: #fff; }
    .input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(14, 165, 164, 0.12); }
    .toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); border: 0; background: transparent; cursor: pointer; color: var(--muted); font-size: 18px; padding: 0; }
    .button { width: 100%; height: 56px; border: 0; border-radius: 14px; background: var(--accent); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .button:disabled { opacity: 0.75; cursor: not-allowed; }
    .small { font-size: 13px; color: var(--muted); margin-top: 14px; }
    .hidden { display: none; }
    .row { display: grid; gap: 12px; }
    .label { font-size: 13px; color: var(--muted); margin-bottom: 6px; display: block; }
    .code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; word-break: break-all; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Reset Password</h1>
    <p id="dynamicInstructions">Redirecting you back to the mobile app layout securely...</p>

    <div id="infoBox" class="box">
      <span class="label">Status</span>
      <div id="infoText" class="code">Syncing verification elements...</div>
    </div>

    <div id="errorBox" class="box error hidden"></div>
    <div id="successBox" class="box success hidden"></div>

    <form id="resetForm" autocomplete="off" class="hidden">
      <div class="row">
        <div class="input-group">
          <span class="label">New Password</span>
          <input id="password" class="input" type="password" placeholder="Enter new password" minlength="8" />
          <button type="button" id="togglePassword" class="toggle">👁</button>
        </div>
        <div class="input-group">
          <span class="label">Confirm Password</span>
          <input id="confirmPassword" class="input" type="password" placeholder="Confirm new password" minlength="8" />
          <button type="button" id="toggleConfirmPassword" class="toggle">👁</button>
        </div>
      </div>
      <button id="submitBtn" class="button" type="submit" style="margin-top: 15px;">Reset Password</button>
    </form>

    <div class="small">
      If you are not automatically redirected, please verify that you have the application installed on your device.
    </div>
  </div>

  <script type="module">
    import { Client, Account } from "https://cdn.jsdelivr.net/npm/appwrite/+esm";

    // Update with your real project configurations
    const APPWRITE_ENDPOINT = "https://cloud.appwrite.io/v1";
    const APPWRITE_PROJECT_ID = "YOUR_PROJECT_ID"; 

    const client = new Client().setEndpoint(APPWRITE_ENDPOINT).setProject(APPWRITE_PROJECT_ID);
    const account = new Account(client);

    const params = new URLSearchParams(window.location.search);
    const userId = params.get("userId") || params.get("user_id") || "";
    const secret = params.get("secret") || "";

    const infoText = document.getElementById("infoText");
    const errorBox = document.getElementById("errorBox");
    const successBox = document.getElementById("successBox");
    const resetForm = document.getElementById("resetForm");
    const dynamicInstructions = document.getElementById("dynamicInstructions");
    const passwordInput = document.getElementById("password");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    const submitBtn = document.getElementById("submitBtn");
    const togglePassword = document.getElementById("togglePassword");
    const toggleConfirmPassword = document.getElementById("toggleConfirmPassword");

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.remove("hidden");
      successBox.classList.add("hidden");
    }

    // Modern Deep Link Bridge Redirection Setup
    if (!userId || !secret) {
      infoText.textContent = "Data structure mismatch. Please access this page using the original email link.";
      showError("Invalid link metadata.");
    } else {
      infoText.textContent = "Handshake parameters accepted.";
      
      // Fire deep link redirect scheme into mobile OS instantly
      const appDeepLink = `vitality://auth/reset-password?userId=${userId}&secret=${secret}`;
      window.location.href = appDeepLink;

      // Fallback UI safety timer (If deep link fails because they are on desktop or app missing)
      setTimeout(() => {
        dynamicInstructions.textContent = "Use this backup form if the application failed to boot automatically.";
        resetForm.classList.remove("hidden");
      }, 2000);
    }

    togglePassword.addEventListener("click", () => {
      passwordInput.type = passwordInput.type === "password" ? "text" : "password";
    });
    toggleConfirmPassword.addEventListener("click", () => {
      confirmPasswordInput.type = confirmPasswordInput.type === "password" ? "text" : "password";
    });

    resetForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      errorBox.classList.add("hidden");
      
      const password = passwordInput.value.trim();
      const confirmPassword = confirmPasswordInput.value.trim();

      if (password !== confirmPassword) {
        showError("Passwords do not match.");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Processing...";

      try {
        await account.updateRecovery(userId, secret, password);
        successBox.textContent = "Password updated! You can close this window now.";
        successBox.classList.remove("hidden");
        resetForm.reset();
      } catch (error) {
        showError(error?.message || "Recovery validation failed.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Reset Password";
      }
    });
  </script>
</body>
</html>
